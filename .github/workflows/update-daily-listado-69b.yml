name: Update listado 69-B (daily)

on:
  schedule:
    - cron: '0 7 * * *'   # every day at 8am UTC
  workflow_dispatch:
    inputs:

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4.2.2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: astral-sh/setup-uv@v5

      - name: Scrape SAT listado 69-B
        run: |
          uv run scripts/listado_69b/scrape.py --force

      - name: Merge and transform
        run: uv run scripts/listado_69b/merge.py

      - name: Commit updated files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add output/
          if git diff --cached --quiet; then
            echo "FILES_CHANGED=" >> $GITHUB_ENV
          else
            git commit -m "chore: update listado 69-B [skip ci]"
            git push
            echo "FILES_CHANGED=$(git show --stat HEAD | grep '|')" >> $GITHUB_ENV
          fi

      - name: Generate HF dataset
        if: env.FILES_CHANGED != ''
        run: uv run scripts/listado_69b/generate_hf.py

      - name: Upload to Hugging Face
        if: env.FILES_CHANGED != ''
        run: huggingface-cli upload-large-folder mayrop/sat-listado-69b hf/dataset/listado-69b/ --repo-type=dataset
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}

      - name: Job summary
        run: |
          echo "## Listado 69-B update" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ -n "$FILES_CHANGED" ]; then
            echo "### Updated files" >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            echo "$FILES_CHANGED" >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
          else
            echo "No changes." >> $GITHUB_STEP_SUMMARY
          fi
