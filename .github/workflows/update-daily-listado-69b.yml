name: Update listado 69-B (daily)

on:
  schedule:
    - cron: '0 7 * * *'   # every day at 8am UTC
  workflow_dispatch:
    inputs:

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4.2.2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: astral-sh/setup-uv@v5

      - name: Scrape SAT listado 69-B
        run: |
          uv run scripts/listado_69b/scrape.py --force

      - name: Merge and transform
        run: uv run scripts/listado_69b/merge.py

      - name: Commit updated files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add output/
          git diff --cached --quiet || git commit -m "chore: update listado 69-B [skip ci]"
          git push

      - name: Job summary
        run: |
          echo "## Listado 69-B update" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          CHANGED=$(git show --stat HEAD 2>/dev/null | grep '|' || echo "")
          if [ -n "$CHANGED" ]; then
            echo "### Updated files" >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            echo "$CHANGED" >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
          else
            echo "No changes." >> $GITHUB_STEP_SUMMARY
          fi
