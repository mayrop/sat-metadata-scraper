name: Update catalogos (daily)

on:
  schedule:
    - cron: '0 8 * * *'   # every day at 7am UTC
  workflow_dispatch:
    inputs:
      section:
        description: 'Section to update'
        type: choice
        default: all
        options:
          - all
          - anexo20/cfdi
          - anexo20/retenciones
          - complementos
          - complementos/comercio-exterior
      force:
        description: 'Force re-download all files'
        type: boolean
        default: false

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4.2.2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: astral-sh/setup-uv@v5

      - name: Install Playwright browsers
        run: uv run playwright install chromium --with-deps

      - name: Scrape SAT
        run: |
          SECTION_ARG=""
          if [ "${{ inputs.section }}" != "" ] && [ "${{ inputs.section }}" != "all" ]; then
            SECTION_ARG="--sections ${{ inputs.section }}"
          fi
          if [ "${{ inputs.force }}" = "true" ]; then
            uv run scripts/catalogos/scrape.py --force $SECTION_ARG
          else
            uv run scripts/catalogos/scrape.py --verify $SECTION_ARG
          fi

      - name: Extract CSVs
        run: |
          SECTION_ARG=""
          if [ "${{ inputs.section }}" != "" ] && [ "${{ inputs.section }}" != "all" ]; then
            SECTION_ARG="--sections ${{ inputs.section }}"
          fi
          uv run scripts/catalogos/extract.py --force $SECTION_ARG

      - name: Extract matrix CSVs
        run: |
          uv run scripts/catalogos/extract_matrices.py --force

      - name: Generate derived tables
        run: uv run scripts/catalogos/generate_uso_regimen_table.py

      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add catalog_state.csv matrix_state.csv output/
          if git diff --cached --quiet; then
            echo "FILES_CHANGED=" >> $GITHUB_ENV
          else
            git commit -m "chore: update catalog_state.csv [skip ci]"
            git push
            echo "FILES_CHANGED<<EOF" >> $GITHUB_ENV
            git show --stat HEAD | grep '|' >> $GITHUB_ENV
            echo "EOF" >> $GITHUB_ENV
          fi

      - name: Extract all CSVs for HF
        run: uv run scripts/catalogos/extract.py --force

      - name: Extract all matrix CSVs for HF
        run: uv run scripts/catalogos/extract_matrices.py --force

      - name: Import static catalogs
        run: uv run scripts/catalogos/import_unspsc_hierarchy.py

      - name: Generate HF dataset
        run: uv run scripts/catalogos/generate_hf.py

      - name: Upload to Hugging Face
        run: |
          uv run python -c "
          from huggingface_hub import HfApi
          HfApi().upload_large_folder(
              folder_path='hf/dataset/catalogos',
              repo_id='mayrop/sat-catalogos',
              repo_type='dataset',
          )
          "
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}

      - name: Job summary
        run: |
          echo "## Catalogos update" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ -n "$FILES_CHANGED" ]; then
            echo "### Updated files" >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            echo "$FILES_CHANGED" >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
          else
            echo "No changes." >> $GITHUB_STEP_SUMMARY
          fi
