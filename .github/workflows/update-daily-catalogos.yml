name: Update catalogos (daily)

on:
  schedule:
    - cron: '0 7 * * *'   # every day at 7am UTC
  workflow_dispatch:
    inputs:
      force:
        description: 'Force re-download all files'
        type: boolean
        default: false

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4.2.2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: astral-sh/setup-uv@v5

      - name: Install Playwright browsers
        run: uv run playwright install chromium --with-deps

      - name: Scrape SAT
        run: |
          if [ "${{ inputs.force }}" = "true" ]; then
            uv run scripts/catalogos/scrape.py --force
          else
            uv run scripts/catalogos/scrape.py
          fi

      - name: Extract CSVs
        run: uv run scripts/catalogos/extract.py

      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add catalog_state.csv output/
          git diff --cached --quiet || git commit -m "chore: update catalog_state.csv [skip ci]"
          git push

      - name: Job summary
        run: |
          echo "## Catalogos update" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          CHANGED=$(git show --stat HEAD 2>/dev/null | grep '|' || echo "")
          if [ -n "$CHANGED" ]; then
            echo "### Updated files" >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            echo "$CHANGED" >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
          else
            echo "No changes." >> $GITHUB_STEP_SUMMARY
          fi
