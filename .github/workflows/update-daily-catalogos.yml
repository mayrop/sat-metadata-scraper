name: Update catalogos (daily)

on:
  schedule:
    - cron: '0 8 * * *'   # every day at 7am UTC
  workflow_dispatch:
    inputs:
      force:
        description: 'Force re-download all files'
        type: boolean
        default: false
      force_upload:
        description: 'Force generate and upload to Hugging Face'
        type: boolean
        default: false

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4.2.2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: astral-sh/setup-uv@v5

      - name: Install Playwright browsers
        run: uv run playwright install chromium --with-deps

      - name: Scrape SAT
        run: |
          if [ "${{ inputs.force }}" = "true" ]; then
            uv run scripts/catalogos/scrape.py --force
          else
            uv run scripts/catalogos/scrape.py --verify
          fi

      - name: Extract CSVs
        run: uv run scripts/catalogos/extract.py

      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add catalog_state.csv output/
          if git diff --cached --quiet; then
            echo "FILES_CHANGED=" >> $GITHUB_ENV
          else
            git commit -m "chore: update catalog_state.csv [skip ci]"
            git push
            echo "FILES_CHANGED=$(git show --stat HEAD | grep '|')" >> $GITHUB_ENV
          fi

      - name: Generate HF dataset
        if: env.FILES_CHANGED != '' || inputs.force_upload == true
        run: uv run scripts/catalogos/generate_hf.py

      - name: Upload to Hugging Face
        if: env.FILES_CHANGED != '' || inputs.force_upload == true
        run: huggingface-cli upload-large-folder mayrop/sat-catalogos hf/dataset/catalogos/ --repo-type=dataset
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}

      - name: Job summary
        run: |
          echo "## Catalogos update" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ -n "$FILES_CHANGED" ]; then
            echo "### Updated files" >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            echo "$FILES_CHANGED" >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
          else
            echo "No changes." >> $GITHUB_STEP_SUMMARY
          fi
